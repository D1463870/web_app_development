{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4 fw-bold">設定本月預算</h2>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-5">
                <form action="{{ url_for('dashboard.budget') }}" method="POST">
                    <div class="mb-4">
                        <label for="amount" class="form-label text-muted">預算金額</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-transparent text-muted">$</span>
                            <input type="number" step="0.01" class="form-control" id="amount" name="amount" value="{{ budget.amount if budget else '' }}" required placeholder="例如：15000">
                        </div>
                    </div>
                    <div class="d-flex justify-content-between pt-2">
                        <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary px-4">取消</a>
                        <button type="submit" class="btn btn-primary px-5 hover-lift">儲存設定</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
