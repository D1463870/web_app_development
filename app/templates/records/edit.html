{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">編輯紀錄</h2>
            <a href="{{ url_for('records.index') }}" class="btn btn-outline-secondary">返回列表</a>
        </div>
        
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form action="{{ url_for('records.update', id=record.id) }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted">日期</label>
                        <input type="date" name="date" class="form-control" required value="{{ record.date }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">分類</label>
                        <select name="category_id" class="form-select" required>
                            <optgroup label="支出">
                                {% for c in categories if c.type == 'expense' %}
                                <option value="{{ c.id }}" {% if record.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                                {% endfor %}
                            </optgroup>
                            <optgroup label="收入">
                                {% for c in categories if c.type == 'income' %}
                                <option value="{{ c.id }}" {% if record.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                                {% endfor %}
                            </optgroup>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">金額</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent text-muted">$</span>
                            <input type="number" step="0.01" name="amount" class="form-control" required value="{{ record.amount }}">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted">備註</label>
                        <input type="text" name="note" class="form-control" value="{{ record.note }}">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 hover-lift">更新紀錄</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
